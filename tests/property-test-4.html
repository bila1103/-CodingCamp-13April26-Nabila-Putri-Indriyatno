<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Property Test 4 — Delete Removes Exactly One</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 1.5rem; background: #f5f7fa; color: #1e2330; }
    h1 { font-size: 1.1rem; margin-bottom: 1rem; }
    .result { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .pass { background: #dcfce7; border: 1px solid #22c55e; color: #166534; }
    .fail { background: #fee2e2; border: 1px solid #ef4444; color: #991b1b; }
    .info { background: #e0e7ff; border: 1px solid #6366f1; color: #3730a3; }
    pre { margin-top: 0.5rem; font-size: 0.8rem; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Property Tests — Expense &amp; Budget Visualizer</h1>
  <div id="output"></div>

  <!-- fast-check via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/fast-check@3/lib/bundle/fast-check.js"></script>

  <!-- Transactions module under test (inline copy — mirrors index.html) -->
  <script>
    const Transactions = {
      add(txns, tx) {
        return [...txns, tx];
      },
      remove(txns, id) {
        return txns.filter(tx => tx.id !== id);
      },
      filter(txns, cat) {
        if (cat === 'All') return txns;
        return txns.filter(tx => tx.category === cat);
      },
      summary(txns) {
        let income = 0, expenses = 0;
        for (const tx of txns) {
          if (tx.type === 'income') income   += tx.amount;
          else                      expenses += tx.amount;
        }
        return { balance: income - expenses, income, expenses };
      },
      byCategory(txns) {
        const map = new Map();
        for (const tx of txns) {
          if (tx.type !== 'expense') continue;
          map.set(tx.category, (map.get(tx.category) ?? 0) + tx.amount);
        }
        return map;
      },
    };
  </script>

  <script>
    // Feature: expense-budget-visualizer, Property 4: Delete removes exactly one

    const out = document.getElementById('output');

    function log(msg, cls = 'info') {
      const div = document.createElement('div');
      div.className = `result ${cls}`;
      div.innerHTML = msg;
      out.appendChild(div);
    }

    // ── Arbitraries ──

    const arbDate = fc.tuple(
      fc.integer({ min: 2000, max: 2099 }),
      fc.integer({ min: 1,    max: 12   }),
      fc.integer({ min: 1,    max: 28   })
    ).map(([y, m, d]) =>
      `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`
    );

    const arbNonEmptyString = fc.string({ minLength: 1, maxLength: 50 })
      .filter(s => s.trim().length > 0);

    const arbPositiveAmount = fc.float({ min: 0.01, max: 1_000_000, noNaN: true, noDefaultInfinity: true })
      .filter(n => n > 0 && isFinite(n));

    const arbTransaction = fc.record({
      id:          fc.oneof(fc.uuidV(4), fc.string({ minLength: 1, maxLength: 30 }).filter(s => s.length > 0)),
      description: arbNonEmptyString,
      amount:      arbPositiveAmount,
      category:    arbNonEmptyString,
      type:        fc.oneof(fc.constant('income'), fc.constant('expense')),
      date:        arbDate,
    });

    // ── Property 4: Delete removes exactly one ──
    // Validates: Requirements 4.2
    // For any non-empty list with unique IDs and any transaction in that list,
    // remove(list, id) must exclude exactly that id and leave all other transactions unchanged.

    // Build a list with unique IDs by using uniqueArray keyed on the id field
    const arbUniqueTransactionList = fc.uniqueArray(arbTransaction, {
      minLength: 1,
      maxLength: 20,
      selector: tx => tx.id,
    });

    try {
      fc.assert(
        fc.property(
          arbUniqueTransactionList,
          fc.nat({ max: 19 }),
          (list, rawIndex) => {
            const index = rawIndex % list.length;
            const target = list[index];
            const deletedId = target.id;
            const result = Transactions.remove(list, deletedId);

            // Result must be exactly one shorter
            if (result.length !== list.length - 1) return false;

            // The deleted id must not appear in the result
            if (result.some(tx => tx.id === deletedId)) return false;

            // Every remaining transaction must have all fields unchanged
            const remaining = list.filter(tx => tx.id !== deletedId);
            if (result.length !== remaining.length) return false;

            return remaining.every(orig => {
              const found = result.find(tx => tx.id === orig.id);
              if (!found) return false;
              return (
                found.description === orig.description &&
                found.amount      === orig.amount      &&
                found.category    === orig.category    &&
                found.type        === orig.type        &&
                found.date        === orig.date
              );
            });
          }
        ),
        { numRuns: 200, verbose: true }
      );

      log('✓ Property 4 passed (200 runs): Transactions.remove(list, id) excludes exactly the target id and leaves all other transactions unchanged.', 'pass');
    } catch (err) {
      log(`✗ Property 4 FAILED<pre>${err.message || err}</pre>`, 'fail');
    }
  </script>
</body>
</html>
